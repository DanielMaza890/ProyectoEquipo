<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Drive Equipo 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mi Drive Personal - Equipo 4</h1>
            
            <div class="controls">
                <button onclick="goBack()" class="btn-secondary">⬅ Volver</button>
                
                <button class="btn-create" onclick="createFolder()">+ Nueva Carpeta</button>
                
                <label class="btn-upload">
                    <span>+ Subir Archivo</span>
                    <input type="file" id="fileInput" onchange="uploadFile()" style="display:none">
                </label>
            </div>
        </header>

        <h3 id="current-path-display">Ubicación: /</h3>

        <div id="folder-grid" class="grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
